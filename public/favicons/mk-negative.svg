<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MK negative favicon">
  <defs>
    <linearGradient id="neg-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8c9ab0"/>
      <stop offset="100%" stop-color="#6f7f97"/>
    </linearGradient>
    <mask id="mk-cutout">
      <rect width="64" height="64" fill="#ffffff"/>
      <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
            font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif"
            font-size="35" font-weight="900" letter-spacing="-2.4"
            fill="#000000">MK</text>
    </mask>
  </defs>

  <circle cx="32" cy="32" r="30" fill="#1f1f1f"/>
  <circle cx="32" cy="32" r="28" fill="url(#neg-fill)" mask="url(#mk-cutout)"/>
</svg>
